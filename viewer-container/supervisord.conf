[supervisord]
nodaemon=true

[program:xvfb]
command=/usr/bin/Xvfb :1 -screen 0 1920x1080x24
autorestart=true
priority=1

[program:fluxbox]
command=/usr/bin/fluxbox
environment=DISPLAY=:1
autorestart=true
priority=2

[program:x11vnc]
command=/usr/bin/x11vnc -display :1 -forever -nopw -shared
environment=DISPLAY=:1
autorestart=true
priority=3

[program:novnc]
command=/usr/share/novnc/utils/launch.sh --vnc localhost:5900 --listen 6080
autorestart=true
priority=4

[program:mricrogl]
command=/app/MRIcroGL/MRIcroGL
directory=/app/MRIcroGL
environment=DISPLAY=:1
autorestart=true
priority=5
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr